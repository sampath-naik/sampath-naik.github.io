<!DOCTYPE html>
<html>
<head>
    <title>Angler Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f19;
            color: white;
        }

        header {
            padding: 20px;
            text-align: center;
            background: #0b0f19;
            border-bottom: 1px solid #1f2a44;
        }

        header h1 {
            margin: 0;
            color: #00d4ff;
        }

        nav {
            text-align: center;
            padding: 10px;
            background: #121a2f;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: 500;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h2 {
            font-size: 32px;
        }

        .hero p {
            color: #aaa;
        }

        .btn {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .whatsapp {
            background: #25D366;
            color: white;
        }

        .instagram {
            background: #E1306C;
            color: white;
        }

        section {
            padding: 40px 20px;
            text-align: center;
        }

        .gallery img {
            width: 220px;
            margin: 10px;
            border-radius: 10px;
        }

        .product {
            background: #121a2f;
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            width: 250px;
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #1f2a44;
            color: #888;
        }
    </style>
</head>

<body>

<header>
    <h1>🎣 Angler Hub</h1>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#catches">Catches</a>
    <a href="shop.html">Shop</a>
    <a href="#contact">Contact</a>
</nav>

<div class="hero">
    <h2>Catch. Share. Sell.</h2>
    <p>Showcasing my fishing journey & premium gear</p>

    <a href="https://wa.me/9972684883" target="_blank">
        <button class="btn whatsapp">WhatsApp Me</button>
    </a>

    <a href="https://instagram.com/jackhunters96" target="_blank">
        <button class="btn instagram">Instagram</button>
    </a>
</div>

<section id="catches">
    <h2>🎣 My Catches</h2>
    <div class="gallery">
        <img src="https://via.placeholder.com/220">
        <img src="https://via.placeholder.com/220">
        <img src="https://via.placeholder.com/220">
    </div>
</section>

<section id="shop">
    <h2>🛒 Fishing Gear</h2>

    <div class="product">
        <h3>Fishing Reel</h3>
        <p>High quality reel</p>
        <button class="btn whatsapp">Order Now</button>
    </div>

    <div class="product">
        <h3>Fishing Rod</h3>
        <p>Strong and durable</p>
        <button class="btn whatsapp">Order Now</button>
    </div>

</section>

<section id="contact">
    <h2>📞 Contact</h2>
    <p>Reach out for orders & collaborations</p>
</section>

<footer>
    <p>© 2026 Angler Hub</p>
</footer>

</body>
</html>
